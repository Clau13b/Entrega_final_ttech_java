<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tienda</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        .card img { max-width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .price { color: green; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .boton { background-color: rgb(104, 4, 4); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 5px; }
        .boton:hover { background-color: darkred; }
        #carrito-section { margin-top: 40px; border-top: 2px solid #ccc; padding-top: 20px; }
    </style>
</head>
<body>

    <h1>Mis Productos</h1>
    <div id="contenedor" class="grid"></div>

    <div id="carrito-section">
        <h2>Tu Carrito (ID: 1)</h2>
        <ul id="lista-carrito"></ul>
    </div>

    <script>
        const ID = 1;
        const BASE_URL = 'http://localhost:8080/api';

        async function cargar() {
            try {
                // Cargar productos
                const resProd = await fetch(`${BASE_URL}/productos`);
                const productos = await resProd.json();
                
                document.getElementById('contenedor').innerHTML = productos.map(p => `
                    <div class="card">
                        <img src="${p.image || 'https://via.placeholder.com/150'}" alt="${p.nombre}">
                        <h3>${p.nombre}</h3>
                        <p class="price">$${p.precio}</p>
                        <button class="boton" onclick="agregar(${p.id})">Agregar</button>
                        <button class="boton" onclick="eliminar(${p.id})" style="background-color: #555;">Eliminar</button>
                    </div>
                `).join('');

                // Cargar carrito
                const resCar = await fetch(`${BASE_URL}/carritos/${ID}`);
                if (resCar.ok) {
                    const carrito = await resCar.json();
                    document.getElementById('lista-carrito').innerHTML = 
                        (carrito.productos || []).map(p => `<li>${p.nombre} - $${p.precio}</li>`).join('');
                }
            } catch (err) {
                console.log("Error al cargar:", err);
            }
        }

        async function agregar(id) {
            await fetch(`${BASE_URL}/carritos/${ID}/productos/${id}`, { method: 'POST' });
            cargar();
        }

        async function eliminar(id) {
            await fetch(`${BASE_URL}/carritos/${ID}/productos/${id}`, { method: 'DELETE' });
            cargar();
        }

        cargar();
    </script>
</body>
</html>
